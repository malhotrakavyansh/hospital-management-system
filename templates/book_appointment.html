{% extends 'base.html' %}

{% block title %}Book Appointment - HMS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="page-title mb-0">Book Appointment</h2>
            <a href="{{ url_for('appointments') }}" class="btn btn-outline-secondary btn-sm"><i class="fas fa-arrow-left me-1"></i> Back</a>
        </div>

        <div class="card border-top border-primary border-3">
            <div class="card-body p-4">
                <form action="{{ url_for('book_appointment') }}" method="POST">
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold"><i class="fas fa-user-injured text-muted me-1"></i> Select Patient</label>
                            <select class="form-select" name="patient_id" required>
                                <option value="" disabled selected>Choose a patient...</option>
                                {% for p in patients %}
                                <option value="{{ p.Patient_ID }}">{{ p.Name }} (ID: {{ p.Patient_ID }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold"><i class="fas fa-user-md text-muted me-1"></i> Select Doctor</label>
                            <select class="form-select" name="doctor_id" required>
                                <option value="" disabled selected>Choose a doctor...</option>
                                {% for d in doctors %}
                                <option value="{{ d.Doctor_ID }}">Dr. {{ d.Name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold"><i class="far fa-calendar-alt text-muted me-1"></i> Appointment Date</label>
                            <input type="date" class="form-control" name="date" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold"><i class="far fa-clock text-muted me-1"></i> Time</label>
                            <input type="time" class="form-control" name="time" required>
                        </div>
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary py-2 fw-bold"><i class="fas fa-check-circle me-2"></i> Confirm Booking</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
