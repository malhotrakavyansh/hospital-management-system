{% extends 'base.html' %}

{% block title %}Doctors - HMS{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="page-title mb-0">Doctor Directory</h2>
    <a href="{{ url_for('add_doctor') }}" class="btn btn-primary"><i class="fas fa-user-md me-1"></i> Add New Doctor</a>
</div>

<div class="row g-4">
    {% for doc in doctors %}
    <div class="col-md-4">
        <div class="card h-100">
            <div class="card-body text-center p-4">
                <div class="mb-3">
                    <div class="bg-primary bg-opacity-10 rounded-circle d-inline-flex justify-content-center align-items-center" style="width: 80px; height: 80px;">
                        <i class="fas fa-user-md fa-2x text-primary"></i>
                    </div>
                </div>
                <h5 class="fw-bold mb-1">{{ doc.Name }}</h5>
                <p class="text-primary fw-semibold mb-3">{{ doc.Specialization }}</p>
                <div class="bg-light p-2 rounded text-muted small">
                    <i class="fas fa-phone-alt me-2"></i> {{ doc.Phone }}
                </div>
            </div>
        </div>
    </div>
    {% else %}
    <div class="col-12">
        <div class="card">
            <div class="card-body text-center py-5 text-muted">
                <i class="fas fa-user-md fa-3x mb-3 opacity-25"></i>
                <p>No doctors registered in the system.</p>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
