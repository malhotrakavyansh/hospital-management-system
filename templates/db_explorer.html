{% extends 'base.html' %}

{% block title %}Database Explorer - HMS{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="page-title mb-0">Database Explorer</h2>
    <span class="badge bg-primary-subtle text-primary border">{{ tables|length }} tables</span>
</div>

<div class="card">
    <div class="card-body p-4">
        {% if tables %}
        <div class="row g-3">
            {% for table in tables %}
            <div class="col-md-4 col-lg-3">
                <a href="{{ url_for('db_table_view', table_name=table) }}" class="btn btn-outline-primary w-100 text-start">
                    <i class="fas fa-table me-2"></i>{{ table }}
                </a>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <div class="text-muted">No tables found in the selected database.</div>
        {% endif %}
    </div>
</div>
{% endblock %}
