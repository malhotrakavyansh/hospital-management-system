{% extends 'base.html' %}

{% block title %}Generate Bill - HMS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="page-title mb-0">Generate Patient Bill</h2>
            <a href="{{ url_for('billing') }}" class="btn btn-outline-secondary btn-sm"><i class="fas fa-arrow-left me-1"></i> Back</a>
        </div>

        <div class="card border-top border-success border-3">
            <div class="card-body p-4">
                <form action="{{ url_for('generate_bill') }}" method="POST">
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold">Select Patient</label>
                        <select class="form-select" name="patient_id" required>
                            <option value="" disabled selected>Choose a patient to bill...</option>
                            {% for p in patients %}
                            <option value="{{ p.Patient_ID }}">{{ p.Name }} (ID: {{ p.Patient_ID }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Total Amount ($)</label>
                            <div class="input-group">
                                <span class="input-group-text">$</span>
                                <input type="number" step="0.01" class="form-control" name="amount" required placeholder="0.00">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Billing Date</label>
                            <input type="date" class="form-control" name="date" required>
                        </div>
                    </div>
                    
                    <div class="alert alert-info py-2 small">
                        <i class="fas fa-info-circle me-1"></i> New bills will be generated with a default status of "Pending".
                    </div>
                    
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-success py-2 fw-bold"><i class="fas fa-file-invoice-dollar me-2"></i> Generate Invoice</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
