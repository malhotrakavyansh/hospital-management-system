{% extends 'base.html' %}

{% block title %}Edit Bill - HMS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="page-title mb-0">Edit Bill</h2>
            <a href="{{ url_for('billing') }}" class="btn btn-outline-secondary btn-sm"><i class="fas fa-arrow-left me-1"></i> Back</a>
        </div>

        <div class="card border-top border-success border-3">
            <div class="card-body p-4">
                <form action="{{ url_for('edit_bill', bill_id=bill.Bill_ID) }}" method="POST">
                    <div class="mb-4">
                        <label class="form-label fw-bold">Select Patient</label>
                        <select class="form-select" name="patient_id" required>
                            {% for p in patients %}
                            <option value="{{ p.Patient_ID }}" {% if p.Patient_ID == bill.Patient_ID %}selected{% endif %}>{{ p.Name }} (ID: {{ p.Patient_ID }})</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Total Amount ($)</label>
                            <div class="input-group">
                                <span class="input-group-text">$</span>
                                <input type="number" step="0.01" class="form-control" name="amount" required value="{{ bill.Amount }}">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Billing Date</label>
                            <input type="date" class="form-control" name="date" required value="{{ bill.Date }}">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Payment Status</label>
                        <select class="form-select" name="payment_status" required>
                            <option value="Pending" {% if bill.Payment_Status == 'Pending' %}selected{% endif %}>Pending</option>
                            <option value="Paid" {% if bill.Payment_Status == 'Paid' %}selected{% endif %}>Paid</option>
                        </select>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-success py-2 fw-bold"><i class="fas fa-save me-2"></i> Update Bill</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
