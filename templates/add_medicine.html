{% extends 'base.html' %}

{% block title %}Add Medicine - HMS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="page-title mb-0">Add Medicine</h2>
            <a href="{{ url_for('medicines') }}" class="btn btn-outline-secondary btn-sm"><i class="fas fa-arrow-left me-1"></i> Back</a>
        </div>

        <div class="card border-top border-warning border-3">
            <div class="card-body p-4">
                <form action="{{ url_for('add_medicine') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Medicine Name</label>
                        <input type="text" class="form-control" name="medicine_name" required>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Category</label>
                            <input type="text" class="form-control" name="category" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Unit Price ($)</label>
                            <input type="number" step="0.01" class="form-control" name="unit_price" required min="0">
                        </div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Stock Quantity</label>
                            <input type="number" class="form-control" name="stock_qty" required min="0">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Expiry Date</label>
                            <input type="date" class="form-control" name="expiry_date" required>
                        </div>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-warning text-dark py-2 fw-bold"><i class="fas fa-save me-2"></i> Save Medicine</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
