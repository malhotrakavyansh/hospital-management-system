{% extends 'base.html' %}

{% block title %}Edit Appointment - HMS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="page-title mb-0">Edit Appointment</h2>
            <a href="{{ url_for('appointments') }}" class="btn btn-outline-secondary btn-sm"><i class="fas fa-arrow-left me-1"></i> Back</a>
        </div>

        <div class="card border-top border-primary border-3">
            <div class="card-body p-4">
                <form action="{{ url_for('edit_appointment', appointment_id=appointment.Appointment_ID) }}" method="POST">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold"><i class="fas fa-user-injured text-muted me-1"></i> Select Patient</label>
                            <select class="form-select" name="patient_id" required>
                                {% for p in patients %}
                                <option value="{{ p.Patient_ID }}" {% if p.Patient_ID == appointment.Patient_ID %}selected{% endif %}>{{ p.Name }} (ID: {{ p.Patient_ID }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold"><i class="fas fa-user-md text-muted me-1"></i> Select Doctor</label>
                            <select class="form-select" name="doctor_id" required>
                                {% for d in doctors %}
                                <option value="{{ d.Doctor_ID }}" {% if d.Doctor_ID == appointment.Doctor_ID %}selected{% endif %}>Dr. {{ d.Name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold"><i class="far fa-calendar-alt text-muted me-1"></i> Appointment Date</label>
                            <input type="date" class="form-control" name="date" required value="{{ appointment.Date }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold"><i class="far fa-clock text-muted me-1"></i> Time</label>
                            <input type="time" class="form-control" name="time" required value="{{ appointment.Time }}">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Status</label>
                        <select class="form-select" name="status" required>
                            <option value="Scheduled" {% if appointment.Status == 'Scheduled' %}selected{% endif %}>Scheduled</option>
                            <option value="Completed" {% if appointment.Status == 'Completed' %}selected{% endif %}>Completed</option>
                            <option value="Cancelled" {% if appointment.Status == 'Cancelled' %}selected{% endif %}>Cancelled</option>
                        </select>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary py-2 fw-bold"><i class="fas fa-save me-2"></i> Update Appointment</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
