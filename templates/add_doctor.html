{% extends 'base.html' %}

{% block title %}Add Doctor - HMS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="page-title mb-0">Onboard New Doctor</h2>
            <a href="{{ url_for('doctors') }}" class="btn btn-outline-secondary btn-sm"><i class="fas fa-arrow-left me-1"></i> Back</a>
        </div>

        <div class="card">
            <div class="card-body p-4">
                <form action="{{ url_for('add_doctor') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Doctor Full Name</label>
                        <input type="text" class="form-control" name="name" required placeholder="Dr. Jane Smith">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Specialization</label>
                        <input type="text" class="form-control" name="specialization" required placeholder="e.g. Cardiologist">
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold">Contact Phone Number</label>
                        <input type="text" class="form-control" name="phone" required placeholder="555-0000">
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary py-2 fw-bold"><i class="fas fa-save me-2"></i> Save Doctor Record</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
